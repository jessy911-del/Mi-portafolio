<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fernando Anaya - Portafolio</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>

    <!-- NAVBAR -->
    <nav class="navbar">
      <div class="logo">Fernando Anaya</div>
      <ul class="menu">
        <li><a href="#">Inicio</a></li>
        <li><a href="#">Proyectos</a></li>
        <li><a href="#">Contacto</a></li>
      </ul>
    </nav>

    <!-- HERO -->
    <section class="hero">
      <h1>Hola, soy <span class="nombre">Fernando Anaya</span></h1>
      <p>Desarrollador web en formación. Apasionado por crear cosas en internet.</p>
      <button class="btn-hero">Ver mis proyectos</button>
      <button class="btn-tema">Cambiar tema</button>
      
    </section>

    <!-- HABILIDADES -->
    <section class="habilidades">
      <h2>Tecnologías que estoy aprendiendo</h2>
      <div class="tarjetas">
        <div class="tarjeta">HTML</div>
        <div class="tarjeta">CSS</div>
        <div class="tarjeta">JavaScript</div>
        <div class="tarjeta">React</div>
      </div>
    </section>

    <!-- PROYECTOS -->
    <section class="proyectos">
      <h2>Mis Proyectos</h2>
      <div class="grid-proyectos" id="grid-proyectos">
      </div>
    </section>

    <!-- CONTACTO -->
    <section class="contacto">
      <h2>Contáctame</h2>
      <input type="text" placeholder="Tu nombre">
      <input type="email" placeholder="Tu email">
      <p class="mensaje-contacto" id="mensaje"></p>
      <button class="btn-hero">Enviar</button>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
      <p>Hecho con ❤️ por Fernando Anaya · 2026</p>
      <div class="redes">
        <a href="#">GitHub</a>
        <a href="#">LinkedIn</a>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
